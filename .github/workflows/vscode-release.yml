name: VS Code Extension Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-conflic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-conflic/package-lock.json

      - run: npm ci
      - run: npm run compile

      - uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: vscode-conflic/dist/

  package-vsix:
    needs: build-extension
    strategy:
      matrix:
        include:
          - vscode-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            binary-name: conflic
          - vscode-target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            binary-name: conflic
          - vscode-target: darwin-x64
            rust-target: x86_64-apple-darwin
            binary-name: conflic
          - vscode-target: darwin-arm64
            rust-target: aarch64-apple-darwin
            binary-name: conflic
          - vscode-target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            binary-name: conflic.exe

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-conflic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-conflic/package-lock.json

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: vscode-conflic/dist/

      # Download the Rust binary from the GitHub release
      - name: Download conflic binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          ARCHIVE_PREFIX="conflic-${TAG}-${{ matrix.rust-target }}"
          mkdir -p bin

          # Try .tar.gz first, then .zip (Windows)
          if gh release download "$TAG" --pattern "${ARCHIVE_PREFIX}.tar.gz" --dir /tmp 2>/dev/null; then
            tar xzf "/tmp/${ARCHIVE_PREFIX}.tar.gz" -C bin/
          elif gh release download "$TAG" --pattern "${ARCHIVE_PREFIX}.zip" --dir /tmp 2>/dev/null; then
            unzip "/tmp/${ARCHIVE_PREFIX}.zip" -d bin/
          else
            echo "ERROR: Could not find binary archive ${ARCHIVE_PREFIX} for ${{ matrix.rust-target }}"
            exit 1
          fi

          # Determine the output binary name for this VS Code target
          PLATFORM_ARCH="${{ matrix.vscode-target }}"
          EXT=""
          if [[ "$PLATFORM_ARCH" == win32-* ]]; then
            EXT=".exe"
          fi
          mv "bin/${{ matrix.binary-name }}" "bin/conflic-${PLATFORM_ARCH}${EXT}"
          chmod +x "bin/conflic-${PLATFORM_ARCH}${EXT}" 2>/dev/null || true

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.vscode-target }}

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: vscode-conflic/*.vsix

  package-universal:
    needs: build-extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-conflic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-conflic/package-lock.json

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: extension-dist
          path: vscode-conflic/dist/

      - name: Package universal VSIX
        run: npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-universal
          path: vscode-conflic/*.vsix

  publish:
    needs: [package-vsix, package-universal]
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true
          path: vsix/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Attach VSIXs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" vsix/*.vsix --clobber
