<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%" height="100%">
    <defs>
        <!-- Arka Plan Grid Deseni -->
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.4" />
        </pattern>
        
        <!-- Tarayıcı (Scanner) Gradyanı -->
        <linearGradient id="scanner-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3fb950" stop-opacity="0" />
            <stop offset="95%" stop-color="#3fb950" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#3fb950" stop-opacity="0.8" />
        </linearGradient>
    </defs>

    <!-- Ana Arka Plan -->
    <rect width="100%" height="100%" fill="#0d1117" />
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- ========================================== -->
    <!-- 1. MERKEZİ (BASE) METİN                    -->
    <!-- ========================================== -->
    <text x="300" y="110" text-anchor="middle" font-size="90" font-family="system-ui, -apple-system, sans-serif" font-weight="900" letter-spacing="-3">
        <!-- "con" Kısmı -->
        <tspan fill="#e6edf3">
            <animate attributeName="fill" values="#e6edf3; #e6edf3; #3fb950; #3fb950; #e6edf3" keyTimes="0; 0.582; 0.583; 0.85; 1" dur="6s" repeatCount="indefinite"/>
            con
        </tspan>
        
        <!-- "fl" Kısmı -->
        <tspan fill="#e6edf3">
            <animate attributeName="fill" values="#e6edf3; #e6edf3; #0d1117; #0d1117; #3fb950; #3fb950; #e6edf3" keyTimes="0; 0.165; 0.166; 0.582; 0.583; 0.85; 1" dur="6s" repeatCount="indefinite"/>
            fl
        </tspan>
        
        <!-- "ic" Kısmı -->
        <tspan fill="#e6edf3">
            <animate attributeName="fill" values="#e6edf3; #e6edf3; #3fb950; #3fb950; #e6edf3" keyTimes="0; 0.582; 0.583; 0.85; 1" dur="6s" repeatCount="indefinite"/>
            ic
        </tspan>
    </text>

    <!-- ========================================== -->
    <!-- 2. CYAN (MAVİ) GLITCH KATMANI              -->
    <!-- ========================================== -->
    <g opacity="0">
        <animate attributeName="opacity" values="0; 0; 0.9; 0.9; 0; 0" keyTimes="0; 0.165; 0.166; 0.582; 0.583; 1" dur="6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate"
            values="0,0; -6,-2; 4,3; -8,1; 3,-4; -5,-1; 7,2; -4,5; 2,-3; -6,0; 5,-2; -3,4; 4,-1; -7,2; 0,0; 0,0; 0,0"
            keyTimes="0; 0.166; 0.19; 0.22; 0.25; 0.28; 0.31; 0.34; 0.37; 0.40; 0.43; 0.46; 0.49; 0.52; 0.55; 0.582; 1" 
            dur="6s" repeatCount="indefinite"/>
        
        <text x="300" y="110" text-anchor="middle" font-size="90" font-family="system-ui, -apple-system, sans-serif" font-weight="900" letter-spacing="-3" style="mix-blend-mode: screen;">
            <tspan fill="transparent">con</tspan><tspan fill="#00f0ff">fl</tspan><tspan fill="transparent">ic</tspan>
        </text>
    </g>

    <!-- ========================================== -->
    <!-- 3. RED (KIRMIZI) GLITCH KATMANI            -->
    <!-- ========================================== -->
    <g opacity="0">
        <animate attributeName="opacity" values="0; 0; 0.9; 0.9; 0; 0" keyTimes="0; 0.165; 0.166; 0.582; 0.583; 1" dur="6s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate"
            values="0,0; 5,3; -3,-2; 7,-1; -4,5; 6,2; -5,-3; 3,-4; -2,4; 5,1; -6,3; 2,-5; -3,2; 8,-1; 0,0; 0,0; 0,0"
            keyTimes="0; 0.166; 0.19; 0.22; 0.25; 0.28; 0.31; 0.34; 0.37; 0.40; 0.43; 0.46; 0.49; 0.52; 0.55; 0.582; 1" 
            dur="6s" repeatCount="indefinite"/>
        
        <text x="300" y="110" text-anchor="middle" font-size="90" font-family="system-ui, -apple-system, sans-serif" font-weight="900" letter-spacing="-3" style="mix-blend-mode: screen;">
            <tspan fill="transparent">con</tspan><tspan fill="#ff003c">fl</tspan><tspan fill="transparent">ic</tspan>
        </text>
    </g>

    <!-- ========================================== -->
    <!-- 4. TARAYICI (SCANNER) IŞIĞI                -->
    <!-- ========================================== -->
    <g opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.44; 0.45; 0.75; 0.76; 1" dur="6s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="translate" 
            values="-150,0; -150,0; 300,0; 750,0; 750,0; 750,0" 
            keyTimes="0; 0.45; 0.583; 0.75; 0.76; 1" dur="6s" repeatCount="indefinite" />
        
        <rect x="-150" y="0" width="150" height="160" fill="url(#scanner-grad)" />
        <line x1="0" y1="0" x2="0" y2="160" stroke="#3fb950" stroke-width="3" />
        <circle cx="0" cy="80" r="4" fill="#3fb950" />
    </g>
</svg>
